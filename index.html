<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>🎰 لعبة الحظ</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      padding-bottom: 40px;
    }

    /* ===== Header ===== */
    .header {
      width: 100%;
      padding: 16px 20px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .header-title { font-size: 20px; font-weight: 700; }
    .balance-box {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a1a;
      padding: 7px 16px;
      border-radius: 20px;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .balance-box:active { transform: scale(0.95); }

    /* ===== Tabs ===== */
    .tabs {
      display: flex;
      width: 92%;
      max-width: 380px;
      margin-top: 16px;
      background: rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 4px;
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 11px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: rgba(255,255,255,0.5);
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a1a;
      box-shadow: 0 2px 10px rgba(247,151,30,0.4);
    }

    /* ===== Tab panels ===== */
    .panel { display: none; width: 100%; flex-direction: column; align-items: center; }
    .panel.show { display: flex; }

    /* ===== Particles ===== */
    #particles { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
    .content { position: relative; z-index: 1; width: 100%; display: flex; flex-direction: column; align-items: center; }

    /* ===== Wheel ===== */
    .wheel-section { margin-top: 20px; display: flex; flex-direction: column; align-items: center; }
    .wheel-wrapper { position: relative; width: 260px; height: 260px; }
    .needle {
      position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 11px solid transparent;
      border-right: 11px solid transparent;
      border-top: 28px solid #ffd200;
      filter: drop-shadow(0 0 6px #ffd200);
      z-index: 10;
    }
    #wheel {
      width: 260px; height: 260px;
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(255,210,0,0.25), inset 0 0 20px rgba(0,0,0,0.3);
    }
    .wheel-center {
      position: absolute; top:50%; left:50%; transform: translate(-50%,-50%);
      width: 46px; height: 46px;
      background: radial-gradient(circle, #ffd200, #f7971e);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 15px rgba(255,210,0,0.8);
      z-index: 5;
    }

    /* ===== Stats mini row ===== */
    .stats-row {
      display: flex; gap: 10px;
      margin-top: 16px;
      width: 92%; max-width: 380px;
    }
    .stat-box {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 10px 6px;
      text-align: center;
    }
    .stat-label { font-size: 10px; color: rgba(255,255,255,0.5); }
    .stat-value { font-size: 15px; font-weight: 700; margin-top: 3px; }

    /* ===== Stake picker ===== */
    .stake-section { margin-top: 18px; width: 92%; max-width: 380px; }
    .stake-label { text-align: center; font-size: 13px; color: rgba(255,255,255,0.55); margin-bottom: 10px; }
    .stakes-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stake-btn {
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(255,255,255,0.13);
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 11px 6px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative; overflow: hidden;
    }
    .stake-btn.active {
      border-color: #ffd200;
      box-shadow: 0 0 14px rgba(255,210,0,0.35);
      transform: scale(1.04);
    }
    .stake-btn:active { transform: scale(0.95); }

    /* ===== Spin button ===== */
    .spin-btn {
      margin-top: 16px;
      width: 92%; max-width: 380px;
      padding: 15px;
      font-size: 17px; font-weight: 800;
      border: none; border-radius: 16px;
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a1a;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(247,151,30,0.45);
      transition: all 0.2s;
    }
    .spin-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(247,151,30,0.65); }
    .spin-btn:active { transform: scale(0.97); }
    .spin-btn:disabled {
      background: linear-gradient(135deg, #444, #666);
      color: #999; cursor: not-allowed;
      box-shadow: none; transform: none;
    }

    /* ===== Cooldown bar ===== */
    .cd-wrap {
      width: 92%; max-width: 380px;
      margin-top: 10px; height: 5px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px; overflow: hidden;
      display: none;
    }
    .cd-bar {
      height: 100%;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      border-radius: 10px; width: 100%;
      transition: width linear;
    }

    /* ===== Result card (inline, not popup) ===== */
    .result-inline {
      display: none;
      width: 92%; max-width: 380px;
      margin-top: 14px;
      border-radius: 18px;
      padding: 20px;
      text-align: center;
      animation: slideIn 0.35s ease;
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .result-inline.win-res  { background: linear-gradient(135deg, rgba(39,174,96,0.25), rgba(46,204,113,0.1)); border: 2px solid #27ae60; }
    .result-inline.lose-res { background: linear-gradient(135deg, rgba(231,76,60,0.25),  rgba(192,57,43,0.1));  border: 2px solid #e74c3c; }
    .result-inline.retry-res{ background: linear-gradient(135deg, rgba(52,152,219,0.25), rgba(41,128,185,0.1)); border: 2px solid #3498db; }
    .result-inline.show { display: block; }
    .res-icon  { font-size: 50px; }
    .res-title { font-size: 22px; font-weight: 800; margin: 6px 0 4px; }
    .res-sub   { font-size: 14px; color: rgba(255,255,255,0.7); }

    /* ===== Stats panel ===== */
    .stats-panel { width: 92%; max-width: 380px; margin-top: 16px; }
    .stats-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .stats-header h3 { font-size: 16px; font-weight: 700; }
    .refresh-btn {
      background: rgba(255,255,255,0.1);
      border: none; border-radius: 10px;
      color: #fff; padding: 6px 12px;
      font-size: 12px; cursor: pointer;
      transition: all 0.2s;
    }
    .refresh-btn:active { transform: scale(0.95); }

    .big-stat {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      margin-bottom: 14px;
    }
    .big-stat-num { font-size: 36px; font-weight: 800; color: #ffd200; }
    .big-stat-lbl { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 2px; }

    .winners-list { display: flex; flex-direction: column; gap: 8px; }
    .winner-item {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .winner-rank { font-size: 18px; width: 30px; }
    .winner-id   { font-size: 13px; color: rgba(255,255,255,0.6); flex: 1; }
    .winner-pts  { font-size: 14px; font-weight: 700; color: #2ecc71; }

    .loading-txt { text-align: center; color: rgba(255,255,255,0.4); padding: 30px; font-size: 14px; }

    /* ===== Spinning glow ===== */
    .spinning { animation: glowRing 0.4s ease-in-out infinite alternate; }
    @keyframes glowRing {
      from { filter: drop-shadow(0 0 10px rgba(255,210,0,0.3)); }
      to   { filter: drop-shadow(0 0 30px rgba(255,210,0,0.9)); }
    }

    /* ===== Confetti ===== */
    .confetti-piece {
      position: fixed; width: 10px; height: 14px; top: -20px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
      z-index: 200;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- Header -->
<div class="header">
  <div class="header-title">🎰 لعبة الحظ</div>
  <div class="balance-box" id="balance-display" onclick="refreshBalance()">⏳ تحميل...</div>
</div>

<div class="content">

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('game')">🎮 اللعبة</button>
    <button class="tab-btn"       onclick="switchTab('stats')">📊 الإحصائيات</button>
  </div>

  <!-- ===== GAME PANEL ===== -->
  <div class="panel show" id="panel-game">

    <!-- Wheel -->
    <div class="wheel-section">
      <div class="wheel-wrapper">
        <div class="needle"></div>
        <canvas id="wheel" width="260" height="260"></canvas>
        <div class="wheel-center">🎯</div>
      </div>
    </div>

    <!-- Mini stats -->
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-label">الجولات</div>
        <div class="stat-value" id="st-plays">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">الفوز</div>
        <div class="stat-value" style="color:#2ecc71" id="st-wins">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">الخسارة</div>
        <div class="stat-value" style="color:#e74c3c" id="st-loses">0</div>
      </div>
    </div>

    <!-- Stake -->
    <div class="stake-section">
      <div class="stake-label">💰 اختر مبلغ الرهان</div>
      <div class="stakes-grid" id="stakes-grid"></div>
    </div>

    <!-- Spin button -->
    <button class="spin-btn" id="spin-btn" onclick="startSpin()">🎰 ادور العجلة</button>

    <!-- Cooldown bar -->
    <div class="cd-wrap" id="cd-wrap">
      <div class="cd-bar" id="cd-bar"></div>
    </div>

    <!-- Result inline -->
    <div class="result-inline" id="result-inline">
      <div class="res-icon" id="res-icon">🎉</div>
      <div class="res-title" id="res-title">مبروك!</div>
      <div class="res-sub"   id="res-sub"></div>
    </div>

  </div>

  <!-- ===== STATS PANEL ===== -->
  <div class="panel" id="panel-stats">
    <div class="stats-panel">
      <div class="stats-header">
        <h3>📊 إحصائيات المشاركين</h3>
        <button class="refresh-btn" onclick="loadStats()">🔄 تحديث</button>
      </div>
      <div class="big-stat">
        <div class="big-stat-num" id="stat-participants">-</div>
        <div class="big-stat-lbl">إجمالي المشاركين في اللعبة</div>
      </div>
      <h3 style="font-size:14px; color:rgba(255,255,255,0.7); margin-bottom:10px;">🏆 آخر 10 فائزين</h3>
      <div class="winners-list" id="winners-list">
        <div class="loading-txt">⏳ جاري التحميل...</div>
      </div>
    </div>
  </div>

</div>

<script>
// ===== Setup =====
const tg      = window.Telegram?.WebApp;
const API     = "https://bot.tota.click";
const STAKES  = [250, 500, 750, 1000, 5000, 10000];
const COOLDOWN= 5;
const MEDALS  = ["🥇","🥈","🥉","4️⃣","5️⃣","6️⃣","7️⃣","8️⃣","9️⃣","🔟"];

if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#0f0c29'); tg.setBackgroundColor('#0f0c29'); }

let balance      = 0;
let selectedStake= 500;
let isSpinning   = false;
let rotation     = 0;
let plays=0, wins=0, loses=0;
const initData   = tg?.initData || "";

// ===== Tabs =====
function switchTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('show'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('show');
  event.currentTarget.classList.add('active');
  if (name === 'stats') loadStats();
}

// ===== Wheel segments =====
const SEGS = [
  { label:'🏆 فوز',    color:'#1e8449', light:'#27ae60' },
  { label:'❌ خسارة',  color:'#922b21', light:'#c0392b' },
  { label:'🔁 إعادة', color:'#1a5276', light:'#2980b9' },
  { label:'🏆 فوز',   color:'#27ae60', light:'#2ecc71' },
  { label:'❌ خسارة', color:'#c0392b', light:'#e74c3c' },
  { label:'✨ حظ',    color:'#b7950b', light:'#ffd200' },
];
const N = SEGS.length;
const SA = 360 / N;
const cvs = document.getElementById('wheel');
const ctx = cvs.getContext('2d');
const CX = cvs.width/2, CY = cvs.height/2, R = CX - 5;

function drawWheel(rot) {
  ctx.clearRect(0,0,cvs.width,cvs.height);
  const off = (rot - 90) * Math.PI / 180;

  // ===== رسم القطاعات =====
  SEGS.forEach((s,i) => {
    const st = off + i * SA * Math.PI/180;
    const en = st + SA * Math.PI/180;

    // تدرج لوني
    const g = ctx.createRadialGradient(CX,CY,R*0.15,CX,CY,R);
    g.addColorStop(0, s.light);
    g.addColorStop(1, s.color);
    ctx.beginPath(); ctx.moveTo(CX,CY); ctx.arc(CX,CY,R,st,en); ctx.closePath();
    ctx.fillStyle = g; ctx.fill();

    // حدود بيضاء واضحة
    ctx.strokeStyle='rgba(255,255,255,0.55)';
    ctx.lineWidth=2.5;
    ctx.stroke();
  });

  // ===== رسم النصوص =====
  SEGS.forEach((s,i) => {
    const midAngle = off + i * SA * Math.PI/180 + (SA/2) * Math.PI/180;
    const textR = R * 0.68; // موضع النص على بعد 68% من المركز

    ctx.save();
    ctx.translate(
      CX + Math.cos(midAngle) * textR,
      CY + Math.sin(midAngle) * textR
    );
    ctx.rotate(midAngle + Math.PI/2); // النص عمودي باتجاه الخارج

    ctx.textAlign   = 'center';
    ctx.textBaseline= 'middle';

    // فصل الإيموجي عن النص العربي
    const parts  = s.label.split(' ');
    const emoji  = parts[0] || '';
    const arabic = parts.slice(1).join(' ');

    // ---- رسم النص العربي بإطار أسود ----
    ctx.font     = 'bold 14px Arial';
    ctx.lineJoin = 'round';
    // طبقة الإطار الأسود (5px)
    ctx.strokeStyle = '#000000';
    ctx.lineWidth   = 5;
    ctx.strokeText(arabic, 0, 4);
    // طبقة النص الأبيض
    ctx.fillStyle = '#ffffff';
    ctx.fillText(arabic, 0, 4);

    // ---- رسم الإيموجي فوق (بدون إطار) ----
    ctx.font      = '13px Arial';
    ctx.fillStyle = '#ffffff';
    ctx.fillText(emoji, 0, -10);
    ctx.restore();
  });

  // ===== الحلقة الخارجية =====
  ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,210,0,0.7)';
  ctx.lineWidth=5;
  ctx.stroke();
}
drawWheel(0);

// ===== Stakes buttons =====
const grid = document.getElementById('stakes-grid');
STAKES.forEach(s => {
  const b = document.createElement('button');
  b.className = 'stake-btn' + (s===selectedStake?' active':'');
  b.textContent = s >= 1000 ? (s/1000)+'K' : s;
  b.onclick = () => {
    document.querySelectorAll('.stake-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); selectedStake = s;
  };
  grid.appendChild(b);
});

// ===== Balance =====
function updateBalanceUI(v) {
  balance = v;
  document.getElementById('balance-display').textContent = '💰 ' + v.toLocaleString('ar');
}
async function refreshBalance() {
  if (!initData) return;
  try {
    const r = await fetch(`${API}/api/lucky/balance?init_data=${encodeURIComponent(initData)}`);
    const d = await r.json();
    if (d.balance !== undefined) updateBalanceUI(d.balance);
  } catch(e) {}
}
refreshBalance();

// ===== Stats =====
async function loadStats() {
  document.getElementById('winners-list').innerHTML = '<div class="loading-txt">⏳ جاري التحميل...</div>';
  try {
    const r = await fetch(`${API}/api/lucky/stats`);
    const d = await r.json();
    document.getElementById('stat-participants').textContent = (d.participants||0).toLocaleString('ar');
    const list = document.getElementById('winners-list');
    if (!d.last10 || d.last10.length === 0) {
      list.innerHTML = '<div class="loading-txt">لا يوجد فائزون بعد</div>';
      return;
    }
    list.innerHTML = d.last10.map((w,i) => `
      <div class="winner-item">
        <span class="winner-rank">${MEDALS[i]||'#'+(i+1)}</span>
        <span class="winner-id">${w.uid}</span>
        <span class="winner-pts">+${w.total_won.toLocaleString('ar')} نقطة</span>
      </div>`).join('');
  } catch(e) {
    document.getElementById('winners-list').innerHTML = '<div class="loading-txt">⚠️ تعذّر التحميل</div>';
  }
}

// ===== Sound Effects =====
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playTick() {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value = 600;
  g.gain.setValueAtTime(0.15, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
  o.start(); o.stop(audioCtx.currentTime + 0.05);
}

function playWin() {
  [523, 659, 784, 1047].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine'; o.frequency.value = f;
    const t = audioCtx.currentTime + i * 0.12;
    g.gain.setValueAtTime(0.25, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o.start(t); o.stop(t + 0.3);
  });
}

function playLose() {
  [300, 250].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sawtooth'; o.frequency.value = f;
    const t = audioCtx.currentTime + i * 0.2;
    g.gain.setValueAtTime(0.2, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o.start(t); o.stop(t + 0.3);
  });
}

function playRetry() {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sine'; o.frequency.value = 440;
  g.gain.setValueAtTime(0.2, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
  o.start(); o.stop(audioCtx.currentTime + 0.4);
}

// ===== Spin =====
async function startSpin() {
  if (isSpinning) return;
  if (!initData) { showResult('error','⚠️','افتح اللعبة من البوت',''); return; }

  // تفعيل AudioContext بعد تفاعل المستخدم
  if (audioCtx.state === 'suspended') audioCtx.resume();

  isSpinning = true;
  document.getElementById('spin-btn').disabled = true;
  document.getElementById('result-inline').classList.remove('show','win-res','lose-res','retry-res');
  cvs.classList.add('spinning');

  // 1) جلب النتيجة من الخادم أولاً
  let data;
  try {
    const r = await fetch(`${API}/api/lucky/play`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ init_data: initData, stake: selectedStake })
    });
    data = await r.json();
  } catch(e) {
    data = { error: 'network' };
  }

  if (data.error) {
    cvs.classList.remove('spinning');
    const msgs = {
      cooldown:             ['⏳','انتظر قليلاً','قبل المحاولة التالية'],
      insufficient_balance: ['😕','رصيدك لا يكفي','اختر رهاناً أقل'],
      unauthorized:         ['🔒','غير مصرح','افتح اللعبة من البوت'],
      tx_failed:            ['⚠️','خطأ في العملية','حاول لاحقاً'],
      network:              ['📡','خطأ في الاتصال','تحقق من الإنترنت'],
    };
    const [ic,ti,su] = msgs[data.error] || ['⚠️','خطأ','حاول لاحقاً'];
    showResult('error', ic, ti, su);
    isSpinning = false;
    document.getElementById('spin-btn').disabled = false;
    return;
  }

  // 2) تحديد القطاع المستهدف بناءً على النتيجة الحقيقية
  const segOptions = { win:[0,3,5], lose:[1,4], retry:[2] };
  const opts = segOptions[data.outcome] || [2];
  const targetSeg = opts[Math.floor(Math.random() * opts.length)];

  // حساب زاوية التوقف:
  // الإبرة في الأعلى (top) تقابل 270° في canvas
  // منتصف القطاع targetSeg يجب أن يكون عند 270°
  // المعادلة: (rot - 90) + targetSeg*SA + SA/2 = 270  =>  rot = 360 - (targetSeg+0.5)*SA
  const targetRot = ((360 - (targetSeg + 0.5) * SA) % 360 + 360) % 360;
  const curMod    = ((rotation % 360) + 360) % 360;
  let   diff      = (targetRot - curMod + 360) % 360;
  if (diff < 45) diff += 360; // ضمان دوران كافٍ قبل التوقف
  const finalRot  = rotation + 5 * 360 + diff;

  // 3) تشغيل أنيميشن الدوران للتوقف على القطاع الصحيح
  const duration  = 4000;
  const startTime = performance.now();
  const startRot  = rotation;
  let lastSeg     = -1;

  await new Promise(resolve => {
    function frame(now) {
      const p = Math.min((now - startTime) / duration, 1);
      const e = 1 - Math.pow(1 - p, 4); // ease-out quart
      rotation = startRot + (finalRot - startRot) * e;
      drawWheel(rotation % 360);

      // صوت نقرة عند تجاوز كل قطاع
      const curSegNow = Math.floor(((rotation % 360) / 360) * N);
      if (curSegNow !== lastSeg) { playTick(); lastSeg = curSegNow; }

      if (p < 1) requestAnimationFrame(frame);
      else { rotation = finalRot; drawWheel(rotation % 360); resolve(); }
    }
    requestAnimationFrame(frame);
  });

  cvs.classList.remove('spinning');

  // 4) تحديث الرصيد والإحصائيات
  updateBalanceUI(data.new_balance);
  plays++;
  if (data.outcome==='win')  wins++;
  if (data.outcome==='lose') loses++;
  document.getElementById('st-plays').textContent = plays;
  document.getElementById('st-wins').textContent  = wins;
  document.getElementById('st-loses').textContent = loses;

  // 5) عرض النتيجة + صوت
  if (data.outcome==='win') {
    playWin();
    showResult('win','🎉','مبروك! فزت 🏆',`ربحت +${data.earned.toLocaleString('ar')} نقطة`);
    launchConfetti();
  } else if (data.outcome==='lose') {
    playLose();
    showResult('lose','😢','للأسف خسرت ❌',`خسرت ${Math.abs(data.earned).toLocaleString('ar')} نقطة`);
  } else {
    playRetry();
    showResult('retry','🔁','إعادة!','لا خصم ولا إضافة — جرّب مجدداً');
  }

  startCooldown();
}

function showResult(type, icon, title, sub) {
  const el = document.getElementById('result-inline');
  el.classList.remove('win-res','lose-res','retry-res');
  if (type==='win')   el.classList.add('win-res');
  if (type==='lose')  el.classList.add('lose-res');
  if (type==='retry') el.classList.add('retry-res');
  document.getElementById('res-icon').textContent  = icon;
  document.getElementById('res-title').textContent = title;
  document.getElementById('res-sub').textContent   = sub;
  el.classList.add('show');
  el.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function startCooldown() {
  const wrap = document.getElementById('cd-wrap');
  const bar  = document.getElementById('cd-bar');
  wrap.style.display='block';
  bar.style.transition='none'; bar.style.width='100%';
  setTimeout(()=>{ bar.style.transition=`width ${COOLDOWN}s linear`; bar.style.width='0%'; },50);
  setTimeout(()=>{
    isSpinning=false;
    document.getElementById('spin-btn').disabled=false;
    wrap.style.display='none'; bar.style.width='100%';
  }, COOLDOWN*1000);
}

// ===== Confetti =====
function launchConfetti() {
  const colors=['#ffd200','#27ae60','#3498db','#e74c3c','#9b59b6','#f39c12'];
  for(let i=0;i<55;i++) {
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.width=(8+Math.random()*8)+'px';
    el.style.height=(12+Math.random()*8)+'px';
    el.style.animationDuration=(2+Math.random()*2)+'s';
    el.style.animationDelay=(Math.random()*0.5)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),5000);
  }
}

// ===== Particles =====
(function(){
  const c=document.getElementById('particles'),ctx2=c.getContext('2d');
  c.width=window.innerWidth; c.height=window.innerHeight;
  const pts=Array.from({length:50},()=>({
    x:Math.random()*c.width, y:Math.random()*c.height,
    r:Math.random()*2+0.5,
    dx:(Math.random()-0.5)*0.35, dy:-(Math.random()*0.45+0.15),
    a:Math.random()*0.4+0.15
  }));
  function tick(){
    ctx2.clearRect(0,0,c.width,c.height);
    pts.forEach(p=>{
      p.x+=p.dx; p.y+=p.dy;
      if(p.y<-5){p.y=c.height+5; p.x=Math.random()*c.width;}
      ctx2.beginPath(); ctx2.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx2.fillStyle=`rgba(255,210,0,${p.a})`; ctx2.fill();
    });
    requestAnimationFrame(tick);
  }
  tick();
  window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight;});
})();
</script>
